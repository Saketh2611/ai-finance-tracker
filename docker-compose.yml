version: "3.9"

services:
  frontend:
    build: ./frontend/ai-finance-tracker
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - ai

  ai:
    build: ./ai-backend
    ports:
      - "8000:8000"
    env_file:
      - ./ai-backend/.env